name: Refresh race data

on:
  schedule:
    # ~6am ET during EDT (5am during EST) — race listings change over days,
    # so exact hour doesn't matter.
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: cd scripts && python3 test_fetch_races.py

      - name: Fetch race data
        run: python3 scripts/fetch_races.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add js/race-data.js data/drivetime-cache.json
          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit."
          else
            git commit -m "data: daily race refresh"
            git push
          fi
